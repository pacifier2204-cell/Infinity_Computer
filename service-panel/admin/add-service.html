<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Service - Staff Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css?v=1.2">
    <style>
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="container" style="padding:0;">
            <a href="../../index.html" style="display: flex; align-items: center; gap: 0.6rem; text-decoration: none;">
                <img src="../../images/logos/infinity_computer_logo.png" alt="Infinity Computer Logo" style="height: 38px; width: auto;">
                <div style="display: flex; flex-direction: column; align-items: flex-start; line-height: 1;">
                    <span class="brand-text">Infinity<span class="text-accent">Computer</span></span>
                    <span style="font-size: 0.65rem; color: #fb2a71; font-weight: 700; text-transform: uppercase;">Service Panel</span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="add-service.html" style="color:var(--primary-color);">New Request</a></li>
                <li><a href="../index.html" target="_blank">Public Tracking</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        <div class="card" style="max-width: 800px; margin: 0 auto; padding: 40px;">
            <h2 class="card-title">Register New Service Request</h2>
            <form id="addServiceForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Customer Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" name="name" class="form-control" required placeholder="Full Name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number <span style="color:var(--danger)">*</span></label>
                        <input type="tel" name="phone" class="form-control" required placeholder="e.g. 9876543210">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="e.g. user@example.com">
                    </div>
                    <div class="form-group">
                        <label>Service Type <span style="color:var(--danger)">*</span></label>
                        <select name="service_type" class="form-control" required>
                            <option value="">Select Type...</option>
                            <option value="Laptop Repair">Laptop Repair</option>
                            <option value="Mobile Repair">Mobile Repair</option>
                            <option value="PC Assembly">PC Assembly</option>
                            <option value="Printer Service">Printer Service</option>
                            <option value="Network Setup">Network Setup</option>
                            <option value="Data Recovery">Data Recovery</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Device Name / Model <span style="color:var(--danger)">*</span></label>
                        <input type="text" name="device_name" class="form-control" placeholder="e.g. Dell XPS 15" required>
                    </div>
                </div>

                <div class="form-group mt-4">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" name="device_received" value="1" checked style="width: 20px; height: 20px; accent-color: var(--primary-color);">
                        <span style="font-weight: 500;">Device Received at Station</span>
                    </label>
                    <small style="color: #6c757d; display: block; margin-top: 5px;">Uncheck this if the device has not been dropped off yet. The request will go to User Requests instead of Active Jobs.</small>
                </div>

                <div class="form-group mt-4">
                    <label>Problem Description <span style="color:var(--danger)">*</span></label>
                    <textarea name="problem" class="form-control" rows="4" required placeholder="Describe the issue in detail..."></textarea>
                </div>

                <div class="form-group mt-4">
                    <label>Upload Device Image (Optional)</label>
                    <div class="image-upload-wrapper">
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
                            <label style="flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; background: #6c757d; color: white; padding: 10px; border-radius: 8px; font-size: 0.9rem; transition: background 0.3s;" onmouseover="this.style.background='#5a6268'" onmouseout="this.style.background='#6c757d'">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                <span>From Gallery</span>
                                <input type="file" accept="image/*" class="image-input" style="display: none;">
                            </label>
                            <label class="camera-btn" style="flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--primary-color); color: white; padding: 10px; border-radius: 8px; font-size: 0.9rem; transition: background 0.3s;" onmouseover="this.style.background='var(--primary-dark)'" onmouseout="this.style.background='var(--primary-color)'">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                                <span>Take Photo</span>
                                <input type="file" accept="image/*" capture="environment" class="image-input" style="display: none;">
                            </label>
                        </div>
                        <div id="imagePreview"></div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary" style="width:100%; max-width:300px; padding:15px; font-size:1.1rem;">Submit Request</button>
                </div>
            </form>
            <div id="formMsg" class="mt-4 text-center" style="font-weight:600; font-size:1.1rem;"></div>
        </div>
    </div>

    <script src="../assets/js/image-processor.js?v=1.2"></script>
    <script src="../assets/js/main.js?v=1.2"></script>
    <script>
        // Initialize Image Preview (Success message instead of preview)
        ImageProcessor.setupPreview('.image-input', '#imagePreview', false);
        ImageProcessor.initCameraVisibility('.camera-btn');

        document.getElementById('addServiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'Processing...';
            
            const formData = new FormData(e.target);

            // Use processed blob if available
            if (window.lastProcessedBlob) {
                formData.set('image', window.lastProcessedBlob, 'processed_image.jpg');
            }

            try {
                const res = await fetch('../api/add_service.php', {
                    method: 'POST',
                    body: formData
                });
                const json = await res.json();
                const msg = document.getElementById('formMsg');
                if(json.status === 'success') {
                    msg.innerHTML = `<span style="color:var(--success)">${json.message}.<br>Service ID: <strong style="font-size:1.4rem;">${json.service_id}</strong></span>`;
                    e.target.reset();
                    document.getElementById('imagePreview').innerHTML = ''; // Clear preview
                    window.lastProcessedBlob = null;
                } else {
                    msg.innerHTML = `<span style="color:var(--danger)">Error: ${json.message}</span>`;
                }
            } catch(err) {
                console.error(err);
                alert('Request failed. Please check network connection.');
            }
            btn.disabled = false;
            btn.innerText = 'Submit Request';
        });
    </script>
</body>
</html>
